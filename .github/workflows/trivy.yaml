name: Run Trivy

on: push


jobs:
  upload:
    name: Upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup GitHub Packages
        uses: actions/setup-java@v3
        with:
          java-version: 8.0.292+10
          distribution: 'adopt'

      - name: Get version
        run: git describe --tags && echo "RELEASE_VERSION=$(git describe --tags)" >> $GITHUB_ENV

      - name: Create jar and rpm
        run: |
          mvn -B -Dmaven.test.skip=true -Drevision=${{ env.RELEASE_VERSION }} -Dsha1= -Dchangelist= clean verify package;
          cd rpm/ && mvn -B -Dmaven.test.skip=true -Drevision=${{ env.RELEASE_VERSION }} -Dsha1= -Dchangelist= -f rpm.pom.xml package;

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.5.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 'Build Image'
        run: |
          docker buildx build --output type=docker --tag ghcr.io/${{ env.REPO_LC }}/app:${{ env.RELEASE_VERSION }} .

      # Run Trivy security scanning
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.18.0
        with:
          format: 'sarif'
          hide-progress: false
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          scan-type: 'image'
          image-ref: 'ghcr.io/${{ env.REPO_LC }}/app:${{ env.RELEASE_VERSION }}'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
